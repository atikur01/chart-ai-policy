name: Auto Update app-ads.txt

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# বটের জন্য রাইট পারমিশন যুক্ত করা হলো
permissions:
  contents: write

jobs:
  update-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Merge app-ads.txt
        run: |
          MY_ADS_LINE="google.com, pub-8385001660731549, DIRECT, f08c47fec0942fa0"
          curl -s https://raw.githubusercontent.com/cleveradssolutions/App-ads.txt/refs/heads/main/app-ads.txt -o remote-ads.txt
          echo "$MY_ADS_LINE" > app-ads.txt
          cat remote-ads.txt >> app-ads.txt
          rm remote-ads.txt

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app-ads.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update app-ads.txt from source" && git push)
