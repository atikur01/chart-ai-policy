name: Auto Update app-ads.txt

on:
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর চেক করবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  update-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Merge app-ads.txt
        run: |
          # আপনার নিজস্ব AdMob তথ্য
          MY_ADS_LINE="google.com, pub-8385001660731549, DIRECT, f08c47fec0942fa0"
          
          # উৎস ফাইল থেকে ডেটা সংগ্রহ করা
          curl -s https://raw.githubusercontent.com/cleveradssolutions/App-ads.txt/refs/heads/main/app-ads.txt -o remote-ads.txt
          
          # নতুন ফাইল তৈরি: প্রথমে আপনার লাইন, তারপর বাকিগুলো
          echo "$MY_ADS_LINE" > app-ads.txt
          cat remote-ads.txt >> app-ads.txt
          
          # সাময়িক ফাইল মুছে ফেলা
          rm remote-ads.txt

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app-ads.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update app-ads.txt from source" && git push)
