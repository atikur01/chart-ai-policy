name: Auto Update app-ads.txt

on:
workflow_dispatch:

schedule:
- cron: "0 */6 * * *"

jobs:
update:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Download latest app-ads.txt
    run: curl -L https://raw.githubusercontent.com/cleveradssolutions/App-ads.txt/main/app-ads.txt -o app-ads.txt

  - name: Add my AdMob line
    run: |
      LINE="google.com, pub-8385001660731549, DIRECT, f08c47fec0942fa0"

      grep -Fxq "$LINE" app-ads.txt || echo "$LINE" >> app-ads.txt

  - name: Commit changes
    run: |
      git config user.name github-actions
      git config user.email github-actions@github.com

      git add app-ads.txt

      if git diff --cached --quiet; then
        echo "No changes"
      else
        git commit -m "Update app-ads.txt"
        git push
      fi
